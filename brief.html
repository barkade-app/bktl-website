<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="BK Tech Labs Brief is coming soon."
    />
    <title>Tech Lab Brief | BK Tech Labs</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="preload" href="assets/bk-tech-labs-hero.png" as="image" />
    <link rel="preload" href="assets/brief-logo.png" as="image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
        <a
          class="nav-logo-link brief-nav-logo is-active"
          href="brief.html"
          aria-label="Brief"
          aria-current="page"
        >
          <img src="assets/brief-nav-logo.png" alt="" />
        </a>
        <a class="nav-logo-link rechat-nav-logo" href="https://therechat.app" aria-label="ReChat">
          <img src="assets/rechat-logo.png" alt="" />
        </a>
        <a class="nav-logo-link" href="https://barkade.app" aria-label="BarKade">
          <img src="assets/barkade-logo.png" alt="" />
        </a>
      </nav>
    </header>

    <main>
      <section class="hero countdown-hero" aria-labelledby="countdown-title">
        <div class="countdown-content">
          <img
            class="countdown-logo"
            src="assets/brief-logo.png"
            alt="Tech Lab Brief"
          />
          <p class="hero-label">Tech Lab Brief</p>
          <h1 id="countdown-title" class="countdown-title">Coming Soon</h1>
          <time
            class="countdown-timer"
            data-countdown
            datetime="2026-07-07T08:00:00-04:00"
            aria-live="polite"
          >
            00:00:00
          </time>
          <p class="countdown-date">July 7, 2026 - 8:00 AM ET</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
